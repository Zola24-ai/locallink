<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalLink</title>
    <meta property="og:title" content="Open Folder in File Explorer">
    <meta property="og:description" content="Click to open this folder on your computer.">
    <meta property="og:type" content="website">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f2f5;
            color: #333;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 32px 40px;
            width: 100%;
            max-width: 560px;
            margin: 20px;
        }
        .title {
            font-size: 20px;
            font-weight: 600;
            color: #222;
            margin: 0 0 20px 0;
        }
        .label {
            font-size: 13px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .path {
            background: #f7f8fa;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px 16px;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 14px;
            word-break: break-all;
            user-select: all;
            width: 100%;
            box-sizing: border-box;
        }
        .hints {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #777;
            line-height: 1.8;
        }
        #main {
            display: none;
        }
        #empty {
            display: none;
            color: #888;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="main">
            <div class="title">LocalLink</div>
            <div class="label">Folder Path</div>
            <div class="path" id="path-display"></div>
            <div class="hints">
                If the folder opened, you're good to go. Close this tab.<br>
                If it didn't, LocalLink may not be installed on this computer.
            </div>
        </div>

        <div id="empty">No folder path provided.</div>
    </div>

    <script>
        (function () {
            var hash = location.hash.substring(1);
            if (!hash) {
                document.getElementById("empty").style.display = "block";
                return;
            }

            var path = decodeURIComponent(hash);
            document.getElementById("path-display").textContent = path;
            document.getElementById("main").style.display = "block";

            window.location.href = "locallink://" + path;
        })();
    </script>
</body>
</html>
