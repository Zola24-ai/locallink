<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalLink - Open Folder</title>
    <meta property="og:title" content="Open Folder in File Explorer">
    <meta property="og:description" content="Click to open this folder on your computer.">
    <meta property="og:type" content="website">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
        }
        .path {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px 16px;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 14px;
            word-break: break-all;
            margin: 16px 0;
            user-select: all;
        }
        p {
            font-size: 15px;
            line-height: 1.6;
            color: #555;
        }
        #main {
            display: none;
        }
        #empty {
            display: none;
            color: #888;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="main">
            <div class="path" id="path-display"></div>
            <p>If the folder opened, you're good to go. Close this tab.</p>
            <p>If it didn't, LocalLink may not be installed on this computer.</p>
        </div>

        <div id="empty">No folder path provided.</div>
    </div>

    <script>
        (function () {
            var hash = location.hash.substring(1);
            if (!hash) {
                document.getElementById("empty").style.display = "block";
                return;
            }

            var path = decodeURIComponent(hash);
            document.getElementById("path-display").textContent = path;
            document.getElementById("main").style.display = "block";

            window.location.href = "locallink://" + path;
        })();
    </script>
</body>
</html>
