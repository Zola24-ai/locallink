<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalLink - Open Folder</title>
    <meta property="og:title" content="Open Folder in File Explorer">
    <meta property="og:description" content="Click to open this folder on your computer.">
    <meta property="og:type" content="website">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
        }
        h2 {
            margin-top: 0;
            color: #222;
        }
        .path {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px 16px;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 14px;
            word-break: break-all;
            margin: 16px 0;
            user-select: all;
        }
        .hint {
            color: #999;
            font-size: 13px;
            margin-top: 24px;
        }
        #empty {
            display: none;
            color: #888;
            font-size: 16px;
        }
        #opened {
            display: none;
        }
        .check {
            font-size: 48px;
            color: #4caf50;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="opened">
            <div class="check">&#10003;</div>
            <h2>Folder opened</h2>
            <p>You can close this tab.</p>
            <div class="path" id="path-display"></div>
            <p class="hint">Folder didn't open? LocalLink may not be installed on this computer.</p>
        </div>

        <div id="empty">No folder path provided.</div>
    </div>

    <script>
        (function () {
            var hash = location.hash.substring(1);
            if (!hash) {
                document.getElementById("empty").style.display = "block";
                return;
            }

            var path = decodeURIComponent(hash);
            document.getElementById("path-display").textContent = path;

            window.location.href = "locallink://" + path;

            setTimeout(function () {
                document.getElementById("opened").style.display = "block";
            }, 500);
        })();
    </script>
</body>
</html>
